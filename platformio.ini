; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared settings for builds that run on real hardware.
; board_build.arduino.memory_type enables the XIAO ESP32-S3's 2 MB PSRAM so
; LovyanGFX can use it as a fallback when allocating the 115 KB framebuffer
; sprite. Without this the sprite may silently fail to allocate in internal
; SRAM (leaving the display black while the rest of the app runs normally).
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
; LittleFS holds the arrival-stage photo folder (data/slideshow/). Flash the
; images separately from the firmware with:  pio run -t uploadfs
board_build.filesystem = littlefs
lib_deps =
	mikalhart/TinyGPSPlus@^1.1.0
	davidarmstrong/WMM_Tinier@^1.0.3
	lovyan03/LovyanGFX @ ^1.2.21
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/Adafruit BNO055@^1.6.4
	adafruit/Adafruit MAX1704X@^1.0.3
build_src_filter = +<*>
